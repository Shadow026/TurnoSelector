<!-- PANTALLA 2: TURNO - Agrega esto después de los botones -->
<div id="pantalla-turno" class="pantalla">
    <h1>Generar Turno</h1>
    <button onclick="generarTurno('remesas')">Remesas</button>
    <button onclick="generarTurno('pago')">Pago de Recibos</button>

    <!--MENSAJE EMERGENTE-->
    <div id="mensaje-emergente" class="mensaje-emergente" style="display: none;">
        <div class="mensaje-contenido">
            <span id="texto-mensaje">Su turno es: </span>
        </div>
    </div>

    <!-- lista original (sigue aquí, pero la ocultaremos con CSS) -->
    <div class="lista-turnos">
        <h3>Turnos Generados:</h3>
        <div id="lista-turnos"></div>
    </div>

    <button class="secundario" onclick="irA('inicio')">Volver</button>
</div>
